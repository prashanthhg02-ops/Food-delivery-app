<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Food Delivery</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="topbar">
    <div class="brand">🍕 Food Delivery</div>
    <div class="top-actions">
      <div class="search-wrap">
        <input id="searchInput" type="search" placeholder="Search pizza, burger, salad..." />
      </div>
      <div class="cart-summary" aria-live="polite">
        <span class="cart-count">Cart: <b id="cartCount">0</b></span>
        <button class="btn btn-primary" id="openCartBtn" type="button">View Cart</button>
      </div>
    </div>
  </header>

  <main class="page">
    <aside class="filters" aria-label="Filters">
      <h3>Menu</h3>
      <div class="filter-group">
        <label for="categorySelect">Category</label>
        <select id="categorySelect">
          <option value="">All</option>
          <option>Pizza</option>
          <option>Burgers</option>
          <option>Salads</option>
          <option>Drinks</option>
        </select>
      </div>

      <div class="filter-group">
        <label for="sortSelect">Sort</label>
        <select id="sortSelect">
          <option value="rating_desc">Rating (high)</option>
          <option value="price_asc">Price (low)</option>
          <option value="price_desc">Price (high)</option>
        </select>
      </div>

      <div class="filter-actions">
        <button class="btn" id="applyFiltersBtn" type="button">Apply</button>
        <button class="btn btn-ghost" id="clearFiltersBtn" type="button">Clear</button>
      </div>

      <div class="hint">
        Tip: Search + filter, then add items to cart.
      </div>
    </aside>

    <section class="content" aria-label="Products">
      <div class="toolbar">
        <div class="toolbar-left">
          <h2 class="section-title">Featured Menu</h2>
          <div class="subtle" id="resultInfo">Loading…</div>
        </div>
        <div class="toolbar-right">
          <button class="btn btn-ghost" id="refreshBtn" type="button">Refresh</button>
        </div>
      </div>

      <div id="productsGrid" class="grid" role="list"></div>
    </section>
  </main>

  <!-- Cart Drawer -->
  <div class="backdrop" id="backdrop" hidden></div>
  <aside class="drawer" id="cartDrawer" aria-label="Cart" hidden>
    <div class="drawer-header">
      <div>
        <h3>🛒 Your Cart</h3>
        <div class="subtle" id="drawerSub">Add items to checkout</div>
      </div>
      <button class="icon-btn" id="closeCartBtn" type="button" aria-label="Close cart">✕</button>
    </div>

    <div class="drawer-body">
      <div id="cartItems" class="cart-items"></div>
      <div class="empty-state" id="emptyState">
        Your cart is empty.
      </div>
    </div>

    <div class="drawer-footer">
      <div class="totals">
        <div class="row">
          <span>Subtotal</span>
          <b id="subtotal">$0.00</b>
        </div>
        <div class="row subtle">
          <span>Delivery</span>
          <b id="delivery">$2.49</b>
        </div>
        <div class="row total">
          <span>Total</span>
          <b id="grandTotal">$0.00</b>
        </div>
      </div>

      <form id="checkoutForm" class="checkout" autocomplete="on">
        <input name="name" id="name" placeholder="Name" required />
        <input name="phone" id="phone" placeholder="Phone" required inputmode="tel" />
        <textarea name="address" id="address" placeholder="Delivery address" rows="3" required></textarea>

        <button class="btn btn-primary btn-block" type="submit" id="checkoutBtn" disabled>
          Checkout
        </button>
        <div class="checkout-msg" id="checkoutMsg" role="status" aria-live="polite"></div>
      </form>
    </div>
  </aside>

  <script src="app.js"></script>
</body>
</html>
